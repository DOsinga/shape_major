<script type="text/markdown" id="info">
name: Shape Major
description: >
  A shape-based mnemonic system for memorising numbers — each digit maps to
  consonants chosen by visual similarity (M rotated is a 3, B is two stacked
  loops like 8, P is 9 upright). Type a number to encode it as a phrase, or a
  word to see what number it spells. A spiritual cousin of the 1648 phonetic
  Major System; see thoughts.md for the differences and history.
type: hacks
github: shape_major
files:
  - [build_buckets.py, "Partition an n-gram CSV into one file per consonant pattern"]
  - [prepare_curation.py, "Apply a freq floor and split patterns into agent chunks"]
  - [apply_drops.py, "Apply yes/no agent drop lists to prioritized/"]
  - [build_index.py, "Combine curated buckets into the word_index.json the app loads"]
</script>

<style>

<div id="ms">
    <input type="text" id="input" placeholder="Type a number (1066) or a word (rocket)…" autofocus>
    <div id="status">Loading…</div>
    <div id="results"></div>

    <div class="mapping">
        <strong>Mapping:</strong>
        <code>0=D/Q/X</code>
        <code>1=L/V</code>
        <code>2=N/Z</code>
        <code>3=M/W</code>
        <code>4=R/K</code>
        <code>5=S</code>
        <code>6=C/F/G</code>
        <code>7=T</code>
        <code>8=B/H</code>
        <code>9=J/P</code>
        — vowels and Y are skipped.
    </div>
</div>

<script>
const LETTER_TO_DIGIT = {
    B:8, C:6, D:0, F:6, G:6, H:8, J:9, K:4, L:1,
    M:3, N:2, P:9, Q:0, R:4, S:5, T:7, V:1, W:3, X:0, Z:2
};
const MIN_SEG = 2;
const MAX_SEG = 6;
const MAX_SEGMENTATIONS = 8;

let wordIndex = null;

function patternOf(word) {
    let p = "";
    for (const ch of word.toUpperCase()) {
        if (LETTER_TO_DIGIT[ch] !== undefined) p += LETTER_TO_DIGIT[ch];
    }
    return p;
}

function findSegmentations(digits) {
    const N = digits.length;
    // DP: minChunks[i] = fewest chunks needed to encode digits[i..N], or Infinity.
    const minChunks = new Array(N + 1).fill(Infinity);
    minChunks[N] = 0;
    for (let pos = N - 1; pos >= 0; pos--) {
        const maxLen = Math.min(MAX_SEG, N - pos);
        for (let len = MIN_SEG; len <= maxLen; len++) {
            const segment = digits.substring(pos, pos + len);
            if (wordIndex[segment] && wordIndex[segment].length > 0) {
                const cost = 1 + minChunks[pos + len];
                if (cost < minChunks[pos]) minChunks[pos] = cost;
            }
        }
    }
    if (minChunks[0] === Infinity) return [];

    // Enumerate segmentations within budget of the optimum, then keep the top
    // MAX_SEGMENTATIONS by chunk count. We include up to min+2 so a slightly
    // longer-but-more-natural encoding can compete.
    const BUDGET = 2;
    const HARD_CAP = 500;
    const maxChunks = minChunks[0] + BUDGET;
    const results = [];

    function enumerate(pos, current) {
        if (results.length >= HARD_CAP) return;
        // Prune: even with the optimal completion, can we stay under maxChunks?
        if (current.length + minChunks[pos] > maxChunks) return;
        if (pos === N) { results.push([...current]); return; }
        const maxLen = Math.min(MAX_SEG, N - pos);
        for (let len = MIN_SEG; len <= maxLen; len++) {
            const segment = digits.substring(pos, pos + len);
            if (wordIndex[segment] && wordIndex[segment].length > 0) {
                current.push(segment);
                enumerate(pos + len, current);
                current.pop();
            }
        }
    }
    enumerate(0, []);

    results.sort((a, b) => a.length - b.length);
    return results.slice(0, MAX_SEGMENTATIONS);
}

// Group a list of segmentations into a trie of shared prefixes. Each node
// also caches the shortest path length to a leaf in its subtree, so we can
// sort children "best-first" and highlight optimal leaves.
function buildTrie(segs) {
    const root = { children: {}, minDepth: 0 };
    for (const seg of segs) {
        let node = root;
        for (const chunk of seg) {
            if (!node.children[chunk]) node.children[chunk] = { children: {}, minDepth: Infinity };
            node = node.children[chunk];
        }
    }
    function computeDepth(node, d) {
        if (Object.keys(node.children).length === 0) { node.minDepth = d; return d; }
        let m = Infinity;
        for (const c of Object.values(node.children)) m = Math.min(m, computeDepth(c, d + 1));
        node.minDepth = m;
        return m;
    }
    computeDepth(root, 0);
    return root;
}

function renderTree(node, currentDepth, minTotalDepth) {
    const entries = Object.entries(node.children);
    entries.sort(([_, a], [__, b]) => a.minDepth - b.minDepth);
    let html = "";
    for (const [chunk, child] of entries) {
        const isLeaf = Object.keys(child.children).length === 0;
        const isOptimalLeaf = isLeaf && currentDepth + 1 === minTotalDepth;
        const picks = (wordIndex[chunk] || []).slice(0, 4);
        const picksHtml = picks.length > 0
            ? `<span class="picks">${picks.map(w => `<span>${w}</span>`).join("")}</span>`
            : `<span class="no-match">no match</span>`;
        html += `<div class="node${isOptimalLeaf ? ' best' : ''}">`;
        html += `<div class="node-row"><span class="digits">${chunk}</span>${picksHtml}</div>`;
        if (!isLeaf) {
            html += `<div class="children">${renderTree(child, currentDepth + 1, minTotalDepth)}</div>`;
        }
        html += `</div>`;
    }
    return html;
}

function renderChunk(digits) {
    const words = wordIndex[digits] || [];
    const top = words.slice(0, 5);
    if (top.length === 0) {
        return `<span class="chunk"><span class="digits">${digits}</span> <span class="no-match">no match</span></span>`;
    }
    const picks = top.map(w => `<span>${w}</span>`).join("");
    return `<span class="chunk"><span class="digits">${digits}</span> <span class="picks">${picks}</span></span>`;
}

function renderSegmentations(segs) {
    if (segs.length === 0) return "";
    const minLen = segs[0].length;  // results are sorted by length asc
    const trie = buildTrie(segs);
    const summary = segs.length === 1 ? '1 encoding' : `${segs.length} encodings`;
    const bestNote = `best uses ${minLen} word${minLen === 1 ? '' : 's'}`;
    let html = `<h3>${summary} · ${bestNote}</h3>`;
    html += `<div class="tree">${renderTree(trie, 0, minLen)}</div>`;
    return html;
}

function renderWordToDigits(word) {
    const pattern = patternOf(word);
    let html = `<h3>Encoding</h3><div class="seg best"><div class="decoded">`;
    for (const ch of word.toUpperCase()) {
        const d = LETTER_TO_DIGIT[ch];
        if (d !== undefined) {
            html += `<span class="digit">${d}</span>`;
        } else {
            html += `<span class="skip">${ch.toLowerCase()}</span>`;
        }
    }
    html += `</div></div>`;
    if (pattern.length >= MIN_SEG) {
        const sameBucket = wordIndex[pattern] || [];
        const others = sameBucket.filter(w => w.toLowerCase() !== word.toLowerCase());
        if (others.length > 0) {
            html += `<h3>Other words encoding ${pattern}</h3><div class="seg">${others.slice(0, 8).map(w => `<span class="chunk"><span class="picks"><span>${w}</span></span></span>`).join("")}</div>`;
        }
    }
    return html;
}

function update() {
    const raw = document.getElementById("input").value.trim();
    const out = document.getElementById("results");
    if (!raw) { out.innerHTML = ""; return; }

    // digits-only? encode mode. else word → digits mode.
    if (/^\d+$/.test(raw)) {
        if (raw.length < MIN_SEG) {
            out.innerHTML = `<p class="no-match">Need at least ${MIN_SEG} digits.</p>`;
            return;
        }
        const segs = findSegmentations(raw);
        if (segs.length === 0) {
            out.innerHTML = `<p class="no-match">No encoding found.</p>`;
        } else {
            out.innerHTML = renderSegmentations(segs);
        }
    } else {
        out.innerHTML = renderWordToDigits(raw);
    }
}

(async function init() {
    const status = document.getElementById("status");
    try {
        const resp = await fetch("{{ static }}word_index.json");
        wordIndex = await resp.json();
        const nPatterns = Object.keys(wordIndex).length;
        status.textContent = `${nPatterns.toLocaleString()} patterns loaded.`;
        const input = document.getElementById("input");
        input.addEventListener("input", update);
        if (input.value) update();
    } catch (e) {
        status.textContent = `Error loading index: ${e.message}`;
    }
})();
</script>
